version: 2

project_name: goclip

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0       # static binary — no system dependencies
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64               # Intel / x86-64
      - arm64               # Apple Silicon / ARM servers
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: ashutoshsinghai
    name: goclip
  name_template: "v{{ .Version }}"

# brew formula will be added in a future release
